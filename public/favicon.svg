<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="slash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#5b9cf5"/>
    </linearGradient>
    <linearGradient id="brackets" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#5b9cf5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0d1117"/>

  <!-- < bracket -->
  <polyline points="11,9 5.5,16 11,23" fill="none" stroke="#4ade80" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- > bracket -->
  <polyline points="21,9 26.5,16 21,23" fill="none" stroke="#5b9cf5" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- / slash with gradient -->
  <line x1="20" y1="7.5" x2="12" y2="24.5" stroke="url(#slash)" stroke-width="2.8" stroke-linecap="round"/>
</svg>
